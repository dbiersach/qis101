[project]
name = "qis101"
version = "0.1.0"
description = "Foundations of Quantum Information Science (QIS101)"
readme = "README.md"

requires-python = ">=3.12,<3.13"

dependencies = [
    "apptools",
    "beautifulsoup4",
    "black",
    "configobj",
    "datasets",
    "ipympl",
    "ipython",
    "jax[cpu]",
    "joblib",
    "jupyter",
    "matplotlib",
    "networkx",
    "numba",
    "numexpr",
    "numpy",
    "pandas",
    "pennylane",
    "pip",
    "pulp",
    "pyface",
    "pygame",
    "pyqt6",
    "pyside6",
    "pyside6-addons",
    "qiskit-aer",
    "qiskit-algorithms",
    "qiskit-experiments",
    "qiskit-ibm-catalog",
    "qiskit-ibm-runtime",
    "qiskit-machine-learning",
    "qiskit-nature",
    "qiskit-optimization",
    "qiskit[all,visualization]",
    "ray[data]",
    "ruff",
    "scikit-learn",
    "scipy",
    "seaborn",
    "selenium",
    "setuptools",
    "sympy",
    "torch",
    "tqdm",
    "traitsui",
    "transformers",
    "webdriver-manager",
    "wheel",
    "torchvision",
    "torchaudio",
    # CuPy: only available on Linux and Windows x64 with CUDA; not on macOS
    "cupy-cuda12x ; sys_platform == 'linux' or (sys_platform == 'win32' and platform_machine == 'AMD64')",
]

[tool.uv]
# Resolve for all three target platforms
required-environments = [
    "sys_platform == 'linux' and platform_machine == 'x86_64'",
    "sys_platform == 'darwin' and platform_machine == 'arm64'",
    "sys_platform == 'win32' and platform_machine == 'AMD64'",
]

[tool.ruff]
extend-include = ["*.ipynb"]
lint.extend-select = ["I", "C4", "ISC", "SIM", "TCH"]
lint.ignore = []
show-fixes = true
target-version = "py314"

# PyTorch index routing by platform:
#   macOS (Apple Silicon) → pytorch-cpu wheel (includes MPS backend)
#   Linux x86_64          → pytorch-cu124 wheel (CUDA 12.4)
#   Windows AMD64         → pytorch-cu124 wheel (CUDA 12.4)
[tool.uv.sources]
torch = [
    { index = "pytorch-cpu",   marker = "sys_platform == 'darwin'" },
    { index = "pytorch-cu124", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]
torchvision = [
    { index = "pytorch-cpu",   marker = "sys_platform == 'darwin'" },
    { index = "pytorch-cu124", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]
torchaudio = [
    { index = "pytorch-cpu",   marker = "sys_platform == 'darwin'" },
    { index = "pytorch-cu124", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[[tool.uv.index]]
name = "pytorch-cu124"
url = "https://download.pytorch.org/whl/cu124"
explicit = true